<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Warning ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f3ee;
    background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
    text-align: center;
    padding: 40px;
}

/* scrapbook card */
.card {
    background: white;
    display: inline-block;
    padding: 30px;
    margin-top: 50px;
    width: 80%;
    max-width: 600px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transform: rotate(-1deg);
}

/* text styling */
h1 {
    font-size: 42px;
    color: #ff4d6d;
}

p {
    font-size: 22px;
    line-height: 1.6;
}

/* buttons */
button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

/* accept button */
.accept {
    background: #ff4d6d;
    color: white;
}

/* runaway button */
.no {
    background: white;
    border: 2px dashed #ff4d6d;
    position: absolute;
}

/* subtle cute decoration */
.tag {
    display: inline-block;
    background: #ffe6ea;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">

    <div class="tag">📌 scrapbook entry</div>

    <h1>WARNING ⚠️</h1>

    <p>
    This website contains dangerous levels cringe, nostalgia, slightly chaotic and poorly hidden affection
    </p>

    <p>
    Side effects may include: smiling and questioning how long this took to make😭
    </p>

    <p><b>Proceed at your own risk</b></p>

    <h2>Button:</h2>

    <button class="accept"
    onclick="alert('I knew you’d accept the risk ❤️ welcome')">
    I accept the risk
    </button>

    <button id="runaway" class="no">
    No
    </button>

</div>

<script>
const button = document.getElementById("runaway");

document.addEventListener("mousemove", function () {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 80);

    button.style.left = x + "px";
    button.style.top = y + "px";
});
</script>

</body>
</html>
