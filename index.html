<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warning Page</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f7f3ee;
    background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
    text-align: center;
    padding: 40px;
}

/* scrapbook card */
.card {
    background: white;
    max-width: 700px;
    margin: auto;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transform: rotate(-1deg);
}

/* big Pinterest-style text */
h1 {
    font-size: 48px;
    color: #ff4d6d;
}

p {
    font-size: 24px;
    line-height: 1.6;
}

/* buttons */
button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

/* accept button */
.accept {
    background: #ff4d6d;
    color: white;
}

/* runaway button */
.no {
    background: white;
    border: 2px dashed #ff4d6d;
    position: absolute;
}
</style>
</head>

<body>

<div class="card">

<h1>WARNING ⚠️</h1>

<p>
This website contains dangerous levels cringe, nostalgia, slightly chaotic and poorly hidden affection
</p>

<p>
Side effects may include: smiling and questioning how long this took to make😭
</p>

<p><b>Proceed at your own risk</b></p>

<h2>Button:</h2>

<!-- ACCEPT BUTTON (goes to main.html) -->
<a href="main.html">
<button class="accept">I accept the risk</button>
</a>

<!-- NO BUTTON -->
<button class="no" id="noBtn">No</button>

</div>

<script>
// ONLY moves when clicked
const btn = document.getElementById("noBtn");

btn.addEventListener("click", function () {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 80);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
});
</script>

</body>
</html>
