<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 1 • Relationship Quiz ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="backgroundHearts"></div>

<div class="scrapbook">

    <!-- Corner Photos -->

    <img src="images/IMG_3599.jpeg" class="cornerPhoto leftPhoto" alt="photo">

    <img src="images/IMG_4160.jpeg" class="cornerPhoto rightPhoto" alt="photo">

    <!-- Decorative Notes -->

    <div class="stickyNote choose">
        Choose carefully 😌
    </div>

    <div class="stickyNote luck">
        Good luck love, you'll need it ❤️
    </div>

    <h1>🎮 Level One</h1>

    <h2>How Well Do You Know Your Girlfriend?</h2>

    <!-- Music -->

    <div class="musicCard">

        <h3>🎵 Official Soundtrack</h3>

        <p>
            You're advised to play the song before answering the questions.
        </p>

       <audio id="bgMusic" preload="auto">
    <source src="music/Laufey-Lover-Girl-(VoxHipHop).mp3" type="audio/mpeg">
</audio> 

        <button id="playMusic">
            ▶ Play Lover Girl
        </button>

    </div>

    <!-- Progress -->

    <div class="progress">

        <div class="heart active"></div>
        <div class="heart"></div>
        <div class="heart"></div>

    </div>

    <!-- Question Card -->

    <div class="questionCard">

        <h3 id="question"></h3>

        <div id="answers"></div>

        <div id="popup"></div>

        <div class="navButtons">

            <button id="back">
                ⬅ Back
            </button>

            <button id="next" disabled>
                Next ➜
            </button>

        </div>

    </div>

</div>

<!-- Finish Screen -->

<div id="finishScreen">

    <div class="finishCard">

        <h1>🎉 Congratulations!</h1>

        <p>
            You've made it to Level 2 ❤️
        </p>

        <button id="level2">
            Proceed to Level 2 →
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
