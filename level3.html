<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3 • Reasons Why I Love You</title>

    <link rel="stylesheet" href="level3.css">

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<section class="page">

    <h1>Reasons Why I Love You ❤️</h1>

    <p class="subtitle">
        Tap an envelope to open a little piece of my heart. 💌
    </p>

    <!-- ================= ENVELOPES ================= -->

    <div class="envelopeGrid">

        <div class="envelope" data-id="0">
            <span>💌</span>
        </div>

        <div class="envelope" data-id="1">
            <span>💌</span>
        </div>

        <div class="envelope" data-id="2">
            <span>💌</span>
        </div>

        <div class="envelope" data-id="3">
            <span>💌</span>
        </div>

    </div>

    <!-- ================= LETTER POPUP ================= -->

    <div id="letterOverlay" class="hidden">

        <div class="letter">

            <button id="closeLetter">✕</button>

            <h2>💌</h2>

            <p id="letterText"></p>

        </div>

    </div>

    <!-- ================= FINISH MESSAGE ================= -->

    <div id="finishedMessage" class="hidden">

        <h2>🥹❤️</h2>

        <p>
            Those are only four reasons...
            <br><br>
            But if I wrote every reason I love you,
            this website would never end. ❤️
        </p>

        <button id="goLevel4">
            Continue to Level 4 →
        </button>

    </div>

</section>

<script src="level3.js"></script>

</body>
</html>
