<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3 • Reasons Why I Love You</title>

    <link rel="stylesheet" href="level3.css">

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<section class="page">

    <h1>Reasons Why I Love You ❤️</h1>

    <p class="subtitle">
        Tap an envelope to open a little piece of my heart 💌
    </p>

    <div class="envelopeGrid">

        <div class="envelope" data-id="0">
            <span>1</span>
        </div>

        <div class="envelope" data-id="1">
            <span>2</span>
        </div>

        <div class="envelope" data-id="2">
            <span>3</span>
        </div>

        <div class="envelope" data-id="3">
            <span>4</span>
        </div>

        <div class="envelope" data-id="4">
            <span>5</span>
        </div>

        <div class="envelope" data-id="5">
            <span>6</span>
        </div>

        <div class="envelope" data-id="6">
            <span>7</span>
        </div>

        <div class="envelope" data-id="7">
            <span>8</span>
        </div>

        <div class="envelope" data-id="8">
            <span>9</span>
        </div>

        <div class="envelope" data-id="9">
            <span>10</span>
        </div>

        <div class="envelope" data-id="10">
            <span>11</span>
        </div>

        <div class="envelope" data-id="11">
            <span>12</span>
        </div>

    </div>

    <!-- Letter Popup -->

    <div id="letterOverlay" class="hidden">

        <div class="letter">

            <button id="closeLetter">
                ✕
            </button>

            <h2>💌</h2>

            <p id="letterText"></p>

        </div>

    </div>

</section>

<script src="level3.js"></script>

</body>
</html>
