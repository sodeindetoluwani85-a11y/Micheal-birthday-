<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 2 - Memory Lane ❤️</title>

<link rel="stylesheet" href="level2.css">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loading Screen -->

<div id="loadingScreen">

    <h1>💌 Memory Lane</h1>

    <p>Loading relationship archives...</p>

    <div class="loadingBar">

        <div class="progress"></div>

    </div>

</div>

<!-- Music -->

<audio id="bgMusic" loop>

    <source src="music/Laufey-lover-Girl(voxhiphop).mp3" type="audio/mpeg">

</audio>

<!-- Main Page -->

<div id="mainPage">

    <!-- Top Header -->

    <div class="topCard">

        <button id="backBtn">← Back</button>

        <h1>Memory Lane 🤍</h1>

        <p>Let's take a trip down memory lane...</p>

        <button id="musicBtn">🎵 Lover Girl</button>

    </div>

    <!-- Decorative Photos -->

    <img src="images/IMG_4384.jpeg" class="cornerPhoto leftPhoto">

    <img src="images/IMG_3653.jpeg" class="cornerPhoto rightPhoto">

    <!-- Question Card -->

    <div class="questionCard">

        <div class="questionNumber">

            QUESTION <span id="currentQuestion">1</span> OF 4

        </div>

        <h2 id="questionText"></h2>

        <div id="answers"></div>

        <button id="submitBtn">
            Submit ❤️
        </button>

        <!-- Wrong Answer Note -->

        <div id="wrongNote">

            💌 Hmm... are you sure about that?<br>

            Try again. 😭❤️

        </div>

    </div>

    <!-- Memory Reveal -->

    <div id="memoryReveal">

        <img id="memoryPhoto">

        <div class="memoryNote">

            <h3>💖 Correct!</h3>

            <p id="memoryText"></p>

        </div>

        <button id="nextBtn">

            Next Memory →

        </button>

    </div>

</div
  <!-- Finish Screen -->

<div id="finishScreen">

    <h1>✨ You Unlocked Another Memory!</h1>

    <p>You've completed Memory Lane.</p>

    <button id="level3Btn">

        Proceed to Level 3 →

    </button>

</div>

<script src="level2.js"></script>

</body>
</html>
