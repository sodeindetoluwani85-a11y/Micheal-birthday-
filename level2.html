<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 2 • Memory Lane</title>

<link rel="stylesheet" href="level2.css">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loading Screen -->

<div id="loadingScreen">

<h1>📖 Memory Lane</h1>

<p>Loading your favourite memories...</p>

<div class="loaderHearts">
❤️ ❤️ ❤️
</div>

</div>

<!-- Main Page -->

<div id="memoryPage">

<h1>📖 Memory Lane</h1>

<p class="subtitle">

Every memory tells a story...

</p>

<div class="questionCard">

<h2 id="question"></h2>

<div id="options"></div>

<div id="popup"></div>

<button id="submitBtn">

Submit Answer ❤️

</button>

</div>

<!-- Hidden Memory -->

<div id="memoryReveal">

<img id="memoryImage" src="" alt="memory">

<p id="memoryText"></p>

<button id="nextMemory">

Next Memory →

</button>

</div>

</div>

<script src="level2.js"></script>

</body>

</html>
